<main class="contact-container">
  <div class="contact-card">
    <div class="user-info">
      <h1>Contact <span>Us</span></h1>
      <p class="label">Get in touch with Malinka Team</p>
    </div>

    <form class="contact-form">
      <div class="form-group">
        <p class="label">Your Name</p>
        <input type="text" placeholder="Enter your name" class="contact-input">
      </div>

      <div class="form-group">
        <p class="label">Your Email</p>
        <input type="email" placeholder="Enter your email" class="contact-input">
      </div>

      <div class="form-group">
        <p class="label">Message</p>
        <textarea placeholder="How can we help?" rows="4" class="contact-input"></textarea>
      </div>

      <button type="button" class="submit-btn">Send Message</button>
    </form>

    <div class="direct-contacts">
      <div class="contact-item">
        <p class="contact-label">Support Email</p>
        <p class="contact-value">support&#64;malinka-store.com</p>
      </div>
      <div class="contact-item">
        <p class="contact-label">Telegram</p>
        <p class="contact-value">&#64;malinka_support</p>
      </div>
    </div>
  </div>
</main>
