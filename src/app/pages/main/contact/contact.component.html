<main class="contact-container">
  <div class="contact-card">
    <div class="user-info">
      <h1>Contact <span>Us</span></h1>
      <p class="label">Get in touch with Malinka Team</p>
    </div>

    @if (user()) {
      <form class="contact-form">
        <div class="form-group">
          <p class="label">Your Name</p>
          <input type="text" [value]="user()?.name || ''" class="contact-input readonly-input input-field" readonly>
        </div>

        <div class="form-group">
          <p class="label">Your Email</p>
          <input type="email" [value]="user()?.email || ''" class="contact-input readonly-input input-field" readonly>
        </div>

        <div class="form-group">
          <p class="label">Subject</p>
          <select class="contact-input select input-field">
            <option value="order">Order Status</option>
            <option value="delivery">Delivery Issues</option>
            <option value="product">Product Question</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <p class="label">Message</p>
          <textarea placeholder="How can we help?" rows="4" class="contact-input input-field"></textarea>
        </div>

        <button type="button" class="submit-btn btn">Send Message</button>
      </form>
    } @else {
      <div class="guest-notice">
        <p>Please <a routerLink="/login">Login</a> to send us a direct message.</p>
      </div>
    }

    <div class="direct-contacts">
      <div class="contact-item">
        <p class="contact-label label">Support Email</p>
        <p class="contact-value">support&#64;malinka-store.com</p>
      </div>
      <div class="contact-item">
        <p class="contact-label label">Telegram</p>
        <p class="contact-value">&#64;malinka_support</p>
      </div>
    </div>

    <div class="faq-promo">
      <div class="faq-text">
        <h3>Have a quick question?</h3>
        <p>Check our Help Center for instant answers.</p>
      </div>
      <button routerLink="/faq" class="faq-btn btn">Go to FAQ</button>
    </div>
  </div>
</main>
